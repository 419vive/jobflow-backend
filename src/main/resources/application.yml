server:
  port: 8080

spring:
  application:
    name: jobflow-backend
  datasource:
    url: jdbc:h2:mem:jobflow;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      repositories:
        enabled: false
  redis:
    host: localhost
    port: 6379

springdoc:
  swagger-ui:
    path: /docs
